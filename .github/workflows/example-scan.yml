name: LLM Security Scan (Example)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target chatbot URL'
        required: true
        type: string
      fail_on_severity:
        description: 'Fail if findings at this severity or above are found'
        required: false
        default: 'high'
        type: choice
        options: [critical, high, medium, low, never]

jobs:
  llm-security-scan:
    name: Valyrian Edge LLM Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run LLM Security Scan
        uses: ./
        with:
          target_url: ${{ inputs.target_url }}
          vulnerabilities: 'LLM01_PROMPT_INJECTION,LLM06_SENSITIVE_INFO_DISCLOSURE,LLM07_INSECURE_PLUGIN'
          llm_provider: 'anthropic'
          llm_model: 'claude-haiku-4-5-20251001'
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          output_dir: 'valyrian-results'
          fail_on_severity: ${{ inputs.fail_on_severity }}
          timeout: '300'

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: valyrian-results/results.sarif
          category: valyrian-edge

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valyrian-scan-results
          path: valyrian-results/
          retention-days: 30
