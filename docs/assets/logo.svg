<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape -->
  <path d="M100 10 L180 50 L180 100 C180 150 140 180 100 190 C60 180 20 150 20 100 L20 50 Z" 
        fill="url(#grad)" stroke="#1E1B4B" stroke-width="3"/>
  
  <!-- Sword -->
  <path d="M100 40 L100 140" stroke="#E0E7FF" stroke-width="8" stroke-linecap="round"/>
  <path d="M80 70 L120 70" stroke="#E0E7FF" stroke-width="6" stroke-linecap="round"/>
  <polygon points="100,35 92,50 108,50" fill="#E0E7FF"/>
  
  <!-- Edge glow effect -->
  <circle cx="100" cy="60" r="15" fill="none" stroke="#A5B4FC" stroke-width="2" opacity="0.5"/>
</svg>
